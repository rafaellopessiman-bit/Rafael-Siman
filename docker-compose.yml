# ── atlas_local — Docker Compose (NestJS + MongoDB Atlas Local) ──────────────
# Uso:  docker compose up -d
# Env:  Copie .env.example → .env e preencha as credenciais
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── MongoDB Atlas Local ────────────────────────────────────────────────────
  atlas-local-db:
    image: mongodb/mongodb-atlas-local:latest
    container_name: atlas-local-db
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:?Defina MONGODB_PASSWORD no .env}
      MONGODB_INITDB_DATABASE: ${MONGODB_DB:-atlas_local_db}
      MONGODB_APP_USER: ${MONGODB_APP_USER:-atlas_app}
      MONGODB_APP_PASSWORD: ${MONGODB_APP_PASSWORD:?Defina MONGODB_APP_PASSWORD no .env}
    volumes:
      - atlas-local-data:/data/db
      - ./mongo-init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - atlas-network

  # ── Redis (BullMQ / Cache) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atlas-local-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - atlas-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - atlas-network

  # ── NestJS Application ────────────────────────────────────────────────────
  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: atlas-local-nestjs
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: "mongodb://${MONGODB_APP_USER:-atlas_app}:${MONGODB_APP_PASSWORD:?Defina MONGODB_APP_PASSWORD no .env}@atlas-local-db:27017/${MONGODB_DB:-atlas_local_db}?authSource=${MONGODB_DB:-atlas_local_db}"
      PORT: ${APP_PORT:-3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      ATLAS_VECTOR_SEARCH_ENABLED: ${ATLAS_VECTOR_SEARCH_ENABLED:-false}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      INDEX_ASYNC_DRIVER: ${INDEX_ASYNC_DRIVER:-event_emitter}
      CACHE_ASK_TTL_MS: ${CACHE_ASK_TTL_MS:-300000}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      atlas-local-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: npm run start:dev
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge

volumes:
  atlas-local-data:
    name: atlas-local-data
  atlas-redis-data:
    name: atlas-redis-data
